version: '3.7'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backoffice-prd
    image: backoffice-prd
    ports:
      - '4000:4000'
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
    networks:
      - 'app-network'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:4000/api/health || curl -f http://localhost:4000/api/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
