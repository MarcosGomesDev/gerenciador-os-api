name: gerenciador-os-api

services:
  postgres:
    image: postgres:18
    restart: unless-stopped

    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker

    volumes:
      - gerenciador-os_pgdata_v18:/var/lib/postgresql

    shm_size: 256m

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: gerenciador-os-prd
    image: gerenciador-os-prd
    ports:
      - '127.0.0.1:${APP_PORT:-3011}:3011'
    env_file:
      - .env
    environment:
      PORT: 3011
    volumes:
      - gerenciador-os_storage:/home/node/app/storage
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:3011/api/health || curl -f http://localhost:3011/api/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  gerenciador-os_pgdata_v18:
    name: gerenciador-os-pgdata-v18
  gerenciador-os_storage:
    name: gerenciador-os-storage
